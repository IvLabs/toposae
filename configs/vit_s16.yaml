# ViT-S/16 on ImageNet-100
# Designed for A100/Colab Pro (16+ GB VRAM)

experiment:
  name: vit_s16_imagenet100
  seed: 42
  alpha: 0.0
  run_id: vit_s16_baseline

data:
  dataset: imagenet-100
  num_classes: 100
  image_size: 224
  data_dir: ./data/imagenet-100
  batch_size: 128
  accumulation_steps: 1
  num_workers: 8

model:
  type: vit_small_patch16_224 # timm model
  pretrained: false
  drop_path_rate: 0.1

training:
  epochs: 90
  optimizer: adamw
  lr: 0.0005              # lower LR for larger models
  weight_decay: 0.05
  warmup_epochs: 10
  lr_min: 0.00001
  mixed_precision: true
  grad_clip: 1.0
  checkpoint_every: 10
  save_best: true

topo_loss:
  sigma: 2.0
  layers: all

analysis:
  probe_images_per_class: 100
  monosemanticity_threshold: 0.5

output:
  results_dir: results
  checkpoints_dir: results/data/checkpoints
  figures_dir: results/figures
  summaries_dir: results/summaries
